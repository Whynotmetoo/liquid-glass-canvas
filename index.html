<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liquid Glass Canvas Demo</title>
    <style>
      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: 'Inter', sans-serif;
      }
      #container {
        position: relative;
        width: 100%;
        height: 100%;
      }
      #bg-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
      }
      #glass-panel {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 400px;
        height: 300px;
        margin-left: -200px;
        margin-top: -150px;
        border-radius: 24px;
        z-index: 10;
        cursor: grab;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        color: white;
        text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        /* Very subtle border to define the edge */
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        user-select: none;
      }
      #glass-panel:active {
        cursor: grabbing;
      }
      h1 {
        margin: 0 0 10px 0;
        font-size: 2rem;
        font-weight: 600;
      }
      p.subtitle {
        margin: 0;
        opacity: 0.7;
        font-size: 0.9rem;
        letter-spacing: 1px;
        text-transform: uppercase;
      }
      .stats {
        margin-top: 30px;
        width: 80%;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .stat {
        display: flex;
        justify-content: space-between;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        padding-bottom: 4px;
        font-family: monospace;
        font-size: 0.9rem;
        opacity: 0.9;
      }
      .stat .active {
        color: #00ffff;
        text-shadow: 0 0 8px #00ffff;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <canvas id="bg-canvas"></canvas>
      <div id="glass-panel">
        <h1>AURORA CORE</h1>
        <p class="subtitle">Drag to distort field</p>
        <div class="stats">
          <div class="stat"><span>PARTICLES</span><span>300,000</span></div>
          <div class="stat"><span>REFRACTION</span><span>1.52</span></div>
          <div class="stat"><span>STATUS</span><span class="active">ACTIVE</span></div>
        </div>
      </div>
    </div>
    <script type="module" src="/demo/main.ts"></script>
  </body>
</html>
